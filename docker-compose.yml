version: "3.8"

services:

  # ── Postgres (metadata DB) ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
      POSTGRES_DB: finsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Qdrant (vector DB) ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    # No curl in qdrant slim image — rely on TCP-up via service_started in backend

  # ── Redis (cache + task queue) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Ollama (local LLM + embeddings, RTX 3080) ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Pull models on first start, then serve
    # Use 'ollama list' for readiness — no curl needed in the ollama image
    entrypoint: >
      /bin/bash -c "
        ollama serve &
        OLLAMA_PID=$$!
        echo 'Waiting for Ollama to start...'
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo 'Pulling nomic-embed-text...'
        ollama pull nomic-embed-text
        echo 'Pulling llama3.1:8b...'
        ollama pull llama3.1:8b
        echo 'Models ready.'
        wait $$OLLAMA_PID
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # model pulls take time (nomic ~300MB + llama3.1:8b ~4.7GB)

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://finsight:finsight@postgres:5432/finsight
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Backend URL used by Next.js server-side rewrites (internal docker network)
      BACKEND_URL: http://backend:8000
      # NEXT_PUBLIC_API_URL is intentionally empty: browser uses relative URLs
      # which the Next.js server proxies to BACKEND_URL above.
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - backend

  # ── ngrok tunnel (public URL → frontend:3000) ─────────────────────────────
  # The frontend proxies all /stocks /news /rag /watchlist calls to the backend
  # internally, so only ONE ngrok tunnel is needed.
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --domain=${NGROK_DOMAIN} frontend:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - frontend

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  model_cache:
